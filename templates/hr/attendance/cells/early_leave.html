{% load custom_filters %}
{% if object.status == 'absent' or object.status == 'on_leave' %}
    <span class="text-muted">-</span>
{% else %}
    {% if object.early_leave_minutes > 0 %}
        <span class="badge bg-danger">{{ object.early_leave_minutes|format_minutes }}</span>
    {% else %}
        <span class="text-success"><i class="fas fa-check"></i></span>
    {% endif %}
{% endif %}
