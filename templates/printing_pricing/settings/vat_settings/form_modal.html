{% load i18n %}
{% load django_bootstrap5 %}

<div class="modal-header">
    <h5 class="modal-title">
        <i class="fas fa-percentage me-2 text-warning"></i>{{ title }}
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form id="vatForm" method="post" action="{{ action_url }}">
    <div class="modal-body">
        {% csrf_token %}
        {% bootstrap_field form.percentage %}
        {% bootstrap_field form.description %}
        {% bootstrap_field form.is_enabled %}
        {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fas fa-times me-1"></i>{% translate "إلغاء" %}
        </button>
        <button type="button" class="btn btn-primary" onclick="submitForm('vatForm')">
            <i class="fas fa-save me-1"></i>{% translate "حفظ" %}
        </button>
    </div>
</form>
